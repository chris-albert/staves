<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#18181b"/>
  <!-- Five staff lines flowing as a wave -->
  <path d="M4 8 Q10 6, 16 8 T28 8" stroke="#a1a1aa" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4 12 Q10 10, 16 12 T28 12" stroke="#a1a1aa" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4 16 Q10 14, 16 16 T28 16" stroke="#e4e4e7" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M4 20 Q10 18, 16 20 T28 20" stroke="#a1a1aa" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4 24 Q10 22, 16 24 T28 24" stroke="#a1a1aa" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Accent note -->
  <ellipse cx="20" cy="12" rx="2.8" ry="2" transform="rotate(-15 20 12)" fill="#e4e4e7"/>
  <line x1="22.5" y1="12" x2="22.5" y2="5" stroke="#e4e4e7" stroke-width="1.3" stroke-linecap="round"/>
</svg>
